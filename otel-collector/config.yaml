receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  # Memory limiter to prevent OOM - must be first in pipeline
  memory_limiter:
    check_interval: 1s
    limit_mib: 400
    spike_limit_mib: 100

  batch:
    timeout: 1s
    send_batch_size: 1024

  # Ensure service_name is always set
  resource:
    attributes:
      - key: service_name
        value: claude-code
        action: upsert

  # Move metric data point attributes to resource attributes so Prometheus exports them as labels
  # Note: Raw OTLP uses dot notation (user.email), we convert to underscore for Prometheus labels
  transform/metrics:
    metric_statements:
      - context: datapoint
        statements:
          - set(resource.attributes["user_email"], attributes["user.email"]) where attributes["user.email"] != nil
          - set(resource.attributes["session_id"], attributes["session.id"]) where attributes["session.id"] != nil
          - set(resource.attributes["model"], attributes["model"]) where attributes["model"] != nil

  # Move log record attributes to resource attributes so Loki indexes them as labels
  # Note: Raw OTLP uses dot notation (user.email), we convert to underscore for Loki labels
  # Delete originals after copying to prevent Loki from creating duplicate *_extracted fields
  transform/logs:
    log_statements:
      - context: log
        statements:
          - set(resource.attributes["user_email"], attributes["user.email"]) where attributes["user.email"] != nil
          - delete_key(attributes, "user.email") where attributes["user.email"] != nil
          - set(resource.attributes["event_name"], attributes["event.name"]) where attributes["event.name"] != nil
          - delete_key(attributes, "event.name") where attributes["event.name"] != nil
          - set(resource.attributes["tool_name"], attributes["tool_name"]) where attributes["tool_name"] != nil
          - delete_key(attributes, "tool_name") where attributes["tool_name"] != nil
          - set(resource.attributes["model"], attributes["model"]) where attributes["model"] != nil
          - delete_key(attributes, "model") where attributes["model"] != nil
          - set(resource.attributes["success"], attributes["success"]) where attributes["success"] != nil
          - delete_key(attributes, "success") where attributes["success"] != nil
          - set(resource.attributes["decision"], attributes["decision"]) where attributes["decision"] != nil
          - delete_key(attributes, "decision") where attributes["decision"] != nil

exporters:
  # Export metrics to Prometheus (collector exposes /metrics endpoint)
  prometheus:
    endpoint: 0.0.0.0:8889

  # Export logs to Loki via OTLP
  otlphttp/loki:
    endpoint: http://loki:3100/otlp
    retry_on_failure:
      enabled: true
      initial_interval: 1s
      max_interval: 30s
      max_elapsed_time: 300s
    sending_queue:
      enabled: true
      num_consumers: 10
      queue_size: 5000

  # Debug exporter for troubleshooting
  debug:
    verbosity: basic

service:
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, transform/metrics, batch]
      exporters: [prometheus, debug]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource, transform/logs, batch]
      exporters: [otlphttp/loki, debug]
