global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Claude Code telemetry
  # Requires: CLAUDE_CODE_ENABLE_TELEMETRY=1 and OTEL_METRICS_EXPORTER=prometheus
  - job_name: 'claude-code'
    static_configs:
      - targets: ['host.docker.internal:9464']
    scrape_interval: 15s
